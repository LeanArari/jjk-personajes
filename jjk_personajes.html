<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jujutsu Kaisen — Personajes</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#080810;font-family:Georgia,serif;min-height:100vh;padding:22px 12px 60px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(120,0,0,.2) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(0,0,100,.12) 0%,transparent 50%);pointer-events:none;z-index:0}
.container{position:relative;z-index:1;max-width:1000px;margin:0 auto}

.header{text-align:center;margin-bottom:22px}
.kanji{font-size:.78rem;color:#c0392b;letter-spacing:.35em;margin-bottom:7px;font-family:monospace}
h1{font-family:'Cinzel Decorative',serif;font-size:clamp(1.3rem,5.5vw,2.5rem);color:#fff;text-shadow:0 0 40px rgba(200,0,0,.5);letter-spacing:.04em}
.subtitle{color:rgba(255,255,255,.28);font-size:.68rem;margin-top:5px;letter-spacing:.2em;font-family:monospace}
.divider{width:80px;height:2px;background:linear-gradient(90deg,transparent,#c0392b,transparent);margin:10px auto 0}

.controls{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
.search-wrap{position:relative}
#searchInput{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#fff;padding:9px 16px 9px 36px;border-radius:30px;font-size:.78rem;font-family:monospace;outline:none;transition:border-color .2s}
#searchInput:focus{border-color:rgba(192,57,43,.6)}
#searchInput::placeholder{color:rgba(255,255,255,.25)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);font-size:.8rem;pointer-events:none}
.filters{display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
.filter-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.65);padding:5px 13px;border-radius:30px;cursor:pointer;font-size:.67rem;letter-spacing:.07em;font-family:monospace;transition:all .2s;-webkit-tap-highlight-color:transparent}
.filter-btn.active{background:rgba(192,57,43,.75);border-color:#c0392b;color:#fff}

#countLabel{text-align:center;font-size:.6rem;color:rgba(255,255,255,.18);font-family:monospace;margin-bottom:12px}

.legend{display:flex;justify-content:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:.64rem;color:rgba(255,255,255,.4)}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}

.card{border-radius:13px;cursor:pointer;border:2px solid rgba(255,255,255,.07);position:relative;overflow:hidden;display:flex;flex-direction:column;aspect-ratio:2/3;transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease,opacity .22s ease;-webkit-tap-highlight-color:transparent;user-select:none;background:#0f0f1e}
.card.selected{transform:scale(1.05);border-color:#f0c040;box-shadow:0 0 22px rgba(240,192,64,.5)}
.card.dimmed{opacity:.3}

.card-img{flex:1;overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;transition:transform .3s ease}
.card:hover .card-img img{transform:scale(1.07)}
.placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.8rem}

.card-overlay{position:absolute;bottom:0;left:0;right:0;height:58%;background:linear-gradient(to top,rgba(0,0,0,.92) 0%,transparent 100%);pointer-events:none}
.card-footer{padding:6px 6px 9px;position:relative;z-index:2}
.card-name{font-family:'Cinzel',serif;font-size:.6rem;font-weight:700;color:#fff;text-align:center;line-height:1.3;margin-bottom:3px;text-shadow:0 1px 3px rgba(0,0,0,.9)}
.card-role{font-size:.52rem;color:rgba(255,255,255,.55);background:rgba(0,0,0,.48);border-radius:20px;padding:1px 6px;text-align:center;font-family:monospace;display:block}
.card-dot{position:absolute;top:7px;right:7px;width:8px;height:8px;border-radius:50%;z-index:3}

.detail{margin-top:22px;background:rgba(8,8,18,.97);border:1px solid rgba(240,192,64,.22);border-radius:17px;padding:18px;position:relative;box-shadow:0 0 40px rgba(0,0,0,.6);display:none;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.detail.visible{display:block}
.detail-bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:17px 17px 0 0}
.detail-inner{display:flex;gap:15px;align-items:flex-start;flex-wrap:wrap}
.detail-img{width:85px;height:118px;border-radius:10px;overflow:hidden;flex-shrink:0;box-shadow:0 4px 20px rgba(0,0,0,.7)}
.detail-img img{width:100%;height:100%;object-fit:cover;object-position:top}
.detail-body{flex:1;min-width:160px}
.detail-name{font-family:'Cinzel',serif;color:#f0c040;font-size:1.05rem;margin-bottom:2px}
.detail-sub{color:rgba(255,255,255,.28);font-size:.65rem;margin-bottom:9px;font-family:monospace}
.detail-desc{color:rgba(255,255,255,.7);font-size:.8rem;line-height:1.65;margin-bottom:11px}
.badges{display:flex;flex-wrap:wrap;gap:5px}
.badge{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:3px 9px;font-size:.62rem;color:#bbb;font-family:monospace}
.badge.gold{background:rgba(240,192,64,.12);border-color:rgba(240,192,64,.25);color:#f0c040}
.badge.red{background:rgba(192,57,43,.15);border-color:rgba(192,57,43,.3);color:#e67e72}
.close-btn{position:absolute;top:11px;right:11px;background:rgba(255,255,255,.07);border:none;color:#888;width:25px;height:25px;border-radius:50%;cursor:pointer;font-size:.72rem;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.no-results{text-align:center;padding:40px;color:rgba(255,255,255,.22);font-family:monospace;font-size:.78rem;grid-column:1/-1}
.hint{text-align:center;margin-top:22px;font-size:.58rem;color:rgba(255,255,255,.12);font-family:monospace}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="kanji">呪術廻戦</div>
    <h1>JUJUTSU KAISEN</h1>
    <div class="subtitle">CUADRO SINÓPTICO DE PERSONAJES</div>
    <div class="divider"></div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Buscar personaje..." autocomplete="off" />
    </div>
    <div class="filters">
      <button class="filter-btn active" data-f="all">✦ TODOS</button>
      <button class="filter-btn" data-f="tokyo">🏫 TOKYO</button>
      <button class="filter-btn" data-f="curse">👹 MALDICIONES</button>
      <button class="filter-btn" data-f="villain">⚔️ VILLANOS</button>
      <button class="filter-btn" data-f="other">👤 OTROS</button>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="ldot" style="background:#e8b84b"></div>Tokyo</div>
    <div class="legend-item"><div class="ldot" style="background:#c0392b"></div>Maldición</div>
    <div class="legend-item"><div class="ldot" style="background:#8e44ad"></div>Villano</div>
    <div class="legend-item"><div class="ldot" style="background:#666"></div>Otro</div>
  </div>

  <div id="countLabel"></div>
  <div id="grid"></div>

  <div class="detail" id="detail">
    <div class="detail-bar" id="detailBar"></div>
    <button class="close-btn" id="closeBtn">✕</button>
    <div class="detail-inner">
      <div class="detail-img" id="detailImg"></div>
      <div class="detail-body">
        <div class="detail-name" id="detailName"></div>
        <div class="detail-sub" id="detailSub"></div>
        <div class="detail-desc" id="detailDesc"></div>
        <div class="badges" id="detailBadges"></div>
      </div>
    </div>
  </div>

  <div class="hint">Toca un personaje para ver sus detalles</div>
</div>

<script>
const BASE = "https://leanarari.github.io/jjk-personajes/";

const C = [
  // CON IMAGEN
  { id:1,  name:"Yuji Itadori",     jp:"虎杖 悠仁",   faction:"tokyo",   dot:"#e8b84b", bg:"linear-gradient(150deg,#6a0a0a,#2a0540)",  img:"yuji.jpg",     grade:"Grado Especial",        technique:"Divergent Fist / Black Flash",          affil:"Tokyo Jujutsu High (1er año)",      desc:"Protagonista. Vessel de Sukuna tras devorar su dedo. Fuerza física extraordinaria y voluntad inquebrantable." },
  { id:2,  name:"Megumi Fushiguro", jp:"伏黒 恵",      faction:"tokyo",   dot:"#e8b84b", bg:"linear-gradient(150deg,#0a1a3a,#040e1e)",  img:"megumi.jpg",   grade:"Semi-Especial",         technique:"Ten Shadows Technique",                affil:"Tokyo Jujutsu High (1er año)",      desc:"Invocador del clan Zenin. Controla sombras para invocar shikigami. Potencial ilimitado según Gojo." },
  { id:3,  name:"Nobara Kugisaki",  jp:"釘崎 野薔薇", faction:"tokyo",   dot:"#e8b84b", bg:"linear-gradient(150deg,#5a1200,#2a0800)",  img:"kugisaki.jpg", grade:"Grado 3",               technique:"Straw Doll Technique",                 affil:"Tokyo Jujutsu High (1er año)",      desc:"Hechicera de campo oriunda de Aomori. Usa mazo y clavos impregnados de energía maldita." },
  { id:4,  name:"Satoru Gojo",      jp:"五条 悟",      faction:"tokyo",   dot:"#e8b84b", bg:"linear-gradient(150deg,#1a0535,#080015)",  img:"satoru.jpg",   grade:"Grado Especial",        technique:"Infinity / Six Eyes",                  affil:"Tokyo Jujutsu High (Profesor)",     desc:"El hechicero más poderoso del mundo moderno. Domina el Infinito y posee los Six Eyes, otorgados una vez cada siglo." },
  { id:5,  name:"Maki Zenin",       jp:"禪院 真希",   faction:"tokyo",   dot:"#e8b84b", bg:"linear-gradient(150deg,#3a1500,#1a0900)",  img:"maki.jpg",     grade:"Grado 4 → Especial",    technique:"Heavenly Restriction",                 affil:"Tokyo Jujutsu High (2do año)",      desc:"Del clan Zenin, nació sin energía maldita. Compensa con fuerza sobrehumana y maestría con armas." },
  { id:6,  name:"Toge Inumaki",     jp:"狗巻 棘",      faction:"tokyo",   dot:"#e8b84b", bg:"linear-gradient(150deg,#003a2a,#001810)",  img:"inumaki.jpg",  grade:"Semi-Especial",         technique:"Cursed Speech",                        affil:"Tokyo Jujutsu High (2do año)",      desc:"Descendiente del clan Inumaki. Su habla maldita obliga al oyente a obedecer. Se comunica solo con ingredientes de onigiri." },
  { id:7,  name:"Yuta Okkotsu",     jp:"乙骨 憂太",  faction:"tokyo",   dot:"#e8b84b", bg:"linear-gradient(150deg,#001a40,#000d20)",  img:"okkotsu.jpg",  grade:"Grado Especial",        technique:"Copy / Rika",                          affil:"Tokyo Jujutsu High (2do año)",      desc:"Protagonista de Jujutsu Kaisen 0. Posee la mayor reserva de energía maldita conocida. Puede copiar técnicas de otros." },
  { id:8,  name:"Ryomen Sukuna",    jp:"両面 宿儺",  faction:"curse",   dot:"#c0392b", bg:"linear-gradient(150deg,#4a0000,#200000)",  img:"sukuna.jpg",   grade:"Rey de Maldiciones",    technique:"Dismantle / Cleave / Shrine / Open",   affil:"Independiente",                     desc:"El Rey de las Maldiciones del mundo antiguo. Reside en sus 20 dedos. La entidad más poderosa de la serie." },
  { id:9,  name:"Suguru Geto",      jp:"夏油 傑",      faction:"villain", dot:"#8e44ad", bg:"linear-gradient(150deg,#001a00,#000d00)",  img:"geto.jpg",     grade:"Grado Especial",        technique:"Cursed Spirit Manipulation",           affil:"Terrorista maldito",                desc:"Ex hechicero, antiguo mejor amigo de Gojo. Decidió exterminar a los no-hechiceros. Su cuerpo fue luego tomado por Kenjaku." },

  // SIN IMAGEN (emoji fallback)
  { id:10, name:"Kento Nanami",     jp:"七海 建人",   faction:"tokyo",   dot:"#e8b84b", bg:"linear-gradient(150deg,#3a2a00,#1a1200)",  img:null, emoji:"⌚", grade:"Grado 1",               technique:"Ratio Technique",                      affil:"Tokyo Jujutsu High",                desc:"Ex empleado de oficina reconvertido en hechicero de grado 1. Usa la técnica de proporción para identificar puntos débiles." },
  { id:11, name:"Panda",            jp:"パンダ",      faction:"tokyo",   dot:"#e8b84b", bg:"linear-gradient(150deg,#1a1a1a,#0a0a0a)",  img:null, emoji:"🐼", grade:"Semi-Especial",         technique:"Blowup / Gorilla Mode",                affil:"Tokyo Jujutsu High (2do año)",      desc:"Construcción maldita creada por Yaga. Parece un oso panda pero posee tres núcleos y puede cambiar de forma de combate." },
  { id:12, name:"Aoi Todo",         jp:"東堂 葵",     faction:"tokyo",   dot:"#e8b84b", bg:"linear-gradient(150deg,#2a1000,#150800)",  img:null, emoji:"💪", grade:"Grado 1",               technique:"Boogie Woogie",                        affil:"Kyoto Jujutsu High (3er año)",      desc:"El hechicero más fuerte de Kyoto. Su Boogie Woogie intercambia posiciones tocando las palmas. Considera a Yuji su hermano." },
  { id:13, name:"Mahito",           jp:"真人",        faction:"curse",   dot:"#c0392b", bg:"linear-gradient(150deg,#1a0030,#0a0018)",  img:null, emoji:"🧩", grade:"Especial",              technique:"Idle Transfiguration",                 affil:"Pseudo-Geto",                       desc:"Maldición que encarna el odio humano. Manipula el alma para transmutar cuerpos. Rival directo de Yuji." },
  { id:14, name:"Jogo",             jp:"漏瑚",        faction:"curse",   dot:"#c0392b", bg:"linear-gradient(150deg,#4a1500,#200a00)",  img:null, emoji:"🌋", grade:"Semi-Especial",         technique:"Disaster Flames",                      affil:"Pseudo-Geto",                       desc:"Maldición volcánica que considera a los humanos los seres anormales. Anhela que las maldiciones dominen el mundo." },
  { id:15, name:"Hanami",           jp:"花御",        faction:"curse",   dot:"#c0392b", bg:"linear-gradient(150deg,#003a00,#001800)",  img:null, emoji:"🌿", grade:"Semi-Especial",         technique:"Disaster Plants",                      affil:"Pseudo-Geto",                       desc:"Maldición que encarna el miedo humano a la naturaleza. Crea ramas y plantas de energía maldita." },
  { id:16, name:"Choso",            jp:"脹相",        faction:"other",   dot:"#666",    bg:"linear-gradient(150deg,#3a0000,#1a0000)",  img:null, emoji:"🩸", grade:"Semi-Especial",         technique:"Blood Manipulation",                   affil:"Yuji (hermano)",                    desc:"Semi-maldición, mitad humano. Hermano mayor de Yuji. Domina la manipulación de sangre con precisión letal." },
  { id:17, name:"Toji Fushiguro",   jp:"伏黒 甚爾",  faction:"villain", dot:"#8e44ad", bg:"linear-gradient(150deg,#0a0a0a,#050505)",  img:null, emoji:"🔪", grade:"Ex-Grado Especial",     technique:"Heavenly Restriction",                 affil:"Asesino a sueldo",                  desc:"El Asesino de Hechiceros. Padre de Megumi. La Heavenly Restriction le eliminó la energía maldita a cambio de capacidades físicas sobrehumanas." },
  { id:18, name:"Kenjaku",          jp:"羂索",        faction:"villain", dot:"#8e44ad", bg:"linear-gradient(150deg,#001500,#000a00)",  img:null, emoji:"🧠", grade:"Grado Especial",        technique:"Body Possession / Antigravity System", affil:"Independiente",                     desc:"Hechicero anciano que sobrevive tomando posesión de cuerpos. Orquesta el Culling Game. Actualmente habita el cuerpo de Geto." },
  { id:19, name:"Mai Zenin",        jp:"禪院 真依",  faction:"villain", dot:"#8e44ad", bg:"linear-gradient(150deg,#2a001a,#150010)",  img:null, emoji:"🔫", grade:"Grado 3",               technique:"Construction",                         affil:"Kyoto Jujutsu High",                desc:"Hermana gemela de Maki. A diferencia de ella, tiene energía maldita pero odia el mundo Jujutsu. Usa una pistola imbuida de energía." },
  { id:20, name:"Kasumi Miwa",      jp:"三輪 霞",    faction:"other",   dot:"#5b9bd5", bg:"linear-gradient(150deg,#001540,#000a20)",  img:null, emoji:"🗡️", grade:"Grado 3",              technique:"New Shadow Style: Simple Domain",      affil:"Kyoto Jujutsu High",                desc:"Hechicera de Kyoto de familia humilde. Usa el estilo Simple Domain con una katana. Una de las más queridas del fandom." },
  { id:21, name:"Kinji Hakari",     jp:"秤 金次",    faction:"tokyo",   dot:"#e8b84b", bg:"linear-gradient(150deg,#2a1a00,#150d00)",  img:null, emoji:"🎰", grade:"Grado 1",               technique:"Idle Death Gamble",                    affil:"Tokyo Jujutsu High (suspendido)",   desc:"Estudiante suspendido de Tokyo. Su técnica es una ruleta maldita — si saca el jackpot, obtiene energía ilimitada por 4 minutos." },
  { id:22, name:"Uraume",           jp:"裏梅",        faction:"villain", dot:"#8e44ad", bg:"linear-gradient(150deg,#001535,#000a1a)",  img:null, emoji:"❄️", grade:"Semi-Especial",        technique:"Ice Formation",                        affil:"Sukuna",                            desc:"Leal seguidor de Sukuna desde la antigüedad. Puede congelar y destruir múltiples objetivos simultáneamente." },
  { id:23, name:"Hiromi Higuruma",  jp:"日車 寛見",  faction:"other",   dot:"#666",    bg:"linear-gradient(150deg,#050520,#020210)",  img:null, emoji:"⚖️", grade:"Grado Especial",       technique:"Deadly Sentencing",                    affil:"Culling Game",                      desc:"Ex abogado convertido en hechicero. Su dominio Deadly Sentencing juzga al oponente y puede confiscarle la técnica maldita." },
  { id:24, name:"Hajime Kashimo",   jp:"鹿紫雲 一",  faction:"other",   dot:"#666",    bg:"linear-gradient(150deg,#1a1a00,#0d0d00)",  img:null, emoji:"⚡", grade:"Especial",              technique:"Genju Kashimo",                        affil:"Culling Game",                      desc:"Hechicero legendario reencarnado de hace 400 años. Participó en el Culling Game buscando a Sukuna." },
  { id:25, name:"Junpei Yoshino",   jp:"吉野 順平",  faction:"other",   dot:"#666",    bg:"linear-gradient(150deg,#1a1000,#0d0800)",  img:null, emoji:"🎭", grade:"No clasificado",        technique:"Moon Dregs",                           affil:"Manipulado por Mahito",             desc:"Estudiante manipulado por Mahito. Tenía una conexión genuina con Yuji antes de su trágico final." },
];

let selectedId = null;
let currentFilter = 'all';
let searchQuery = '';

function getFiltered() {
  return C.filter(c => {
    const fm = currentFilter === 'all' || c.faction === currentFilter;
    const sm = !searchQuery || c.name.toLowerCase().includes(searchQuery.toLowerCase());
    return fm && sm;
  });
}

function factionLabel(f) {
  return {tokyo:'Tokyo',curse:'Maldición',villain:'Villano',other:'Otro'}[f]||'';
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const filtered = getFiltered();
  document.getElementById('countLabel').textContent = `${filtered.length} personaje${filtered.length!==1?'s':''}`;
  grid.innerHTML = '';

  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results">No se encontraron personajes 🔍</div>';
    return;
  }

  filtered.forEach(c => {
    const isSel = c.id === selectedId;
    const isDim = selectedId && !isSel;
    const card = document.createElement('div');
    card.className = 'card'+(isSel?' selected':'')+(isDim?' dimmed':'');
    card.style.background = c.bg;

    const dot = document.createElement('div');
    dot.className = 'card-dot';
    dot.style.background = c.dot;
    dot.style.boxShadow = `0 0 5px ${c.dot}`;

    const imgWrap = document.createElement('div');
    imgWrap.className = 'card-img';
    imgWrap.style.background = c.bg;

    if (c.img) {
      const img = document.createElement('img');
      img.src = BASE + c.img;
      img.alt = c.name;
      img.loading = 'lazy';
      img.onerror = () => { imgWrap.innerHTML = `<div class="placeholder" style="background:${c.bg}">${c.emoji||'👤'}</div>`; };
      imgWrap.appendChild(img);
    } else {
      imgWrap.innerHTML = `<div class="placeholder" style="background:${c.bg}">${c.emoji||'👤'}</div>`;
    }

    const ov = document.createElement('div');
    ov.className = 'card-overlay';

    const foot = document.createElement('div');
    foot.className = 'card-footer';
    foot.style.background = c.bg;
    foot.innerHTML = `<div class="card-name">${c.name}</div><span class="card-role">${factionLabel(c.faction)}</span>`;

    card.appendChild(dot);
    card.appendChild(imgWrap);
    card.appendChild(ov);
    card.appendChild(foot);
    card.addEventListener('click', () => handleClick(c.id));
    grid.appendChild(card);
  });
}

function handleClick(id) {
  if (selectedId === id) {
    selectedId = null;
    document.getElementById('detail').classList.remove('visible');
  } else {
    selectedId = id;
    showDetail(id);
  }
  renderGrid();
  if (selectedId) setTimeout(() => document.getElementById('detail').scrollIntoView({behavior:'smooth',block:'nearest'}), 80);
}

function showDetail(id) {
  const c = C.find(x => x.id === id);
  if (!c) return;
  document.getElementById('detailBar').style.background = c.bg;
  const di = document.getElementById('detailImg');
  di.style.background = c.bg;
  if (c.img) {
    const img = document.createElement('img');
    img.src = BASE + c.img;
    img.alt = c.name;
    img.onerror = () => { di.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:2.5rem">${c.emoji||'👤'}</div>`; };
    di.innerHTML = '';
    di.appendChild(img);
  } else {
    di.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:2.5rem">${c.emoji||'👤'}</div>`;
  }
  document.getElementById('detailName').textContent = c.name;
  document.getElementById('detailSub').textContent = c.jp + ' · ' + factionLabel(c.faction);
  document.getElementById('detailDesc').textContent = c.desc;
  document.getElementById('detailBadges').innerHTML = `
    <span class="badge gold">🏅 ${c.grade}</span>
    <span class="badge">🏫 ${c.affil}</span>
    <span class="badge red">⚡ ${c.technique}</span>
  `;
  document.getElementById('detail').classList.add('visible');
}

document.getElementById('closeBtn').addEventListener('click', () => {
  selectedId = null;
  document.getElementById('detail').classList.remove('visible');
  renderGrid();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.f;
    selectedId = null;
    document.getElementById('detail').classList.remove('visible');
    renderGrid();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  selectedId = null;
  document.getElementById('detail').classList.remove('visible');
  renderGrid();
});

renderGrid();
</script>
</body>
</html>
