<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jujutsu Kaisen — Personajes</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#080810;font-family:Georgia,serif;min-height:100vh;padding:22px 12px 60px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(120,0,0,.2) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(0,0,100,.12) 0%,transparent 50%);pointer-events:none;z-index:0}
.container{position:relative;z-index:1;max-width:1000px;margin:0 auto}

/* HEADER */
.header{text-align:center;margin-bottom:22px}
.kanji{font-size:.78rem;color:#c0392b;letter-spacing:.35em;margin-bottom:7px;font-family:monospace}
h1{font-family:'Cinzel Decorative',serif;font-size:clamp(1.3rem,5.5vw,2.5rem);color:#fff;text-shadow:0 0 40px rgba(200,0,0,.5);letter-spacing:.04em}
.subtitle{color:rgba(255,255,255,.28);font-size:.68rem;margin-top:5px;letter-spacing:.2em;font-family:monospace}
.divider{width:80px;height:2px;background:linear-gradient(90deg,transparent,#c0392b,transparent);margin:10px auto 0}

/* CONTROLS */
.controls{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
.search-wrap{position:relative}
#searchInput{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#fff;padding:9px 16px 9px 36px;border-radius:30px;font-size:.78rem;font-family:monospace;outline:none;transition:border-color .2s}
#searchInput:focus{border-color:rgba(192,57,43,.6)}
#searchInput::placeholder{color:rgba(255,255,255,.25)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);font-size:.8rem;pointer-events:none}
.filters{display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
.filter-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.65);padding:5px 13px;border-radius:30px;cursor:pointer;font-size:.67rem;letter-spacing:.07em;font-family:monospace;transition:all .2s;-webkit-tap-highlight-color:transparent}
.filter-btn.active{background:rgba(192,57,43,.75);border-color:#c0392b;color:#fff}

#countLabel{text-align:center;font-size:.6rem;color:rgba(255,255,255,.18);font-family:monospace;margin-bottom:12px}

/* LEGEND */
.legend{display:flex;justify-content:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:.64rem;color:rgba(255,255,255,.4)}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* GRID */
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:9px}

/* CARD */
.card{border-radius:13px;cursor:pointer;border:2px solid rgba(255,255,255,.07);position:relative;overflow:hidden;display:flex;flex-direction:column;aspect-ratio:2/3;transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease,opacity .22s ease;-webkit-tap-highlight-color:transparent;user-select:none;background:#0f0f1e}
.card.selected{transform:scale(1.05);border-color:#f0c040;box-shadow:0 0 22px rgba(240,192,64,.5)}
.card.related{transform:scale(1.02);border-color:rgba(240,192,64,.4);box-shadow:0 0 10px rgba(240,192,64,.2)}
.card.dimmed{opacity:.3}

.card-img{flex:1;overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;transition:transform .3s ease}
.card:hover .card-img img{transform:scale(1.07)}
.placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.6rem}

.card-overlay{position:absolute;bottom:0;left:0;right:0;height:58%;background:linear-gradient(to top,rgba(0,0,0,.92) 0%,transparent 100%);pointer-events:none}
.card-footer{padding:6px 6px 8px;position:relative;z-index:2}
.card-name{font-family:'Cinzel',serif;font-size:.58rem;font-weight:700;color:#fff;text-align:center;line-height:1.3;margin-bottom:3px;text-shadow:0 1px 3px rgba(0,0,0,.9)}
.card-role{font-size:.5rem;color:rgba(255,255,255,.55);background:rgba(0,0,0,.48);border-radius:20px;padding:1px 6px;text-align:center;font-family:monospace;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-dot{position:absolute;top:7px;right:7px;width:8px;height:8px;border-radius:50%;z-index:3}

/* DETAIL */
.detail{margin-top:22px;background:rgba(8,8,18,.97);border:1px solid rgba(240,192,64,.22);border-radius:17px;padding:18px;position:relative;box-shadow:0 0 40px rgba(0,0,0,.6);display:none;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.detail.visible{display:block}
.detail-bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:17px 17px 0 0}
.detail-inner{display:flex;gap:15px;align-items:flex-start;flex-wrap:wrap}
.detail-img{width:82px;height:115px;border-radius:10px;overflow:hidden;flex-shrink:0;box-shadow:0 4px 20px rgba(0,0,0,.7)}
.detail-img img{width:100%;height:100%;object-fit:cover;object-position:top}
.detail-body{flex:1;min-width:160px}
.detail-name{font-family:'Cinzel',serif;color:#f0c040;font-size:1.05rem;margin-bottom:2px}
.detail-sub{color:rgba(255,255,255,.28);font-size:.65rem;margin-bottom:9px;font-family:monospace}
.detail-desc{color:rgba(255,255,255,.7);font-size:.8rem;line-height:1.65;margin-bottom:11px}
.badges{display:flex;flex-wrap:wrap;gap:5px}
.badge{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:3px 9px;font-size:.62rem;color:#bbb;font-family:monospace}
.badge.gold{background:rgba(240,192,64,.12);border-color:rgba(240,192,64,.25);color:#f0c040}
.badge.red{background:rgba(192,57,43,.15);border-color:rgba(192,57,43,.3);color:#e67e72}
.close-btn{position:absolute;top:11px;right:11px;background:rgba(255,255,255,.07);border:none;color:#888;width:25px;height:25px;border-radius:50%;cursor:pointer;font-size:.72rem;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}

.no-results{text-align:center;padding:40px;color:rgba(255,255,255,.22);font-family:monospace;font-size:.78rem}
.hint{text-align:center;margin-top:22px;font-size:.58rem;color:rgba(255,255,255,.12);font-family:monospace}
</style>
</head>

let selectedId = null;
let currentFilter = 'all';
let searchQuery = '';

function getFiltered() {
  return C.filter(c => {
    const fm = currentFilter === 'all' || c.faction === currentFilter;
    const sm = !searchQuery || c.name.toLowerCase().includes(searchQuery.toLowerCase()) || c.jp.includes(searchQuery);
    return fm && sm;
  });
}

function dotColor(faction) {
  return { tokyo:'#e8b84b', kyoto:'#5b9bd5', curse:'#c0392b', villain:'#8e44ad', other:'#666' }[faction] || '#666';
}

function factionLabel(faction) {
  return { tokyo:'Tokyo', kyoto:'Kyoto', curse:'Maldición', villain:'Villano', other:'Otro' }[faction] || '';
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const filtered = getFiltered();
  document.getElementById('countLabel').textContent = `${filtered.length} personaje${filtered.length !== 1 ? 's' : ''}`;
  grid.innerHTML = '';

  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results" style="grid-column:1/-1">No se encontraron personajes 🔍</div>';
    return;
  }

  filtered.forEach(c => {
    const isSel = c.id === selectedId;
    const isDim = selectedId && !isSel;
    const card = document.createElement('div');
    card.className = 'card' + (isSel ? ' selected' : '') + (isDim ? ' dimmed' : '');
    card.style.background = c.bg;

    const dot = document.createElement('div');
    dot.className = 'card-dot';
    dot.style.background = c.dot;
    dot.style.boxShadow = `0 0 5px ${c.dot}`;

    const imgWrap = document.createElement('div');
    imgWrap.className = 'card-img';
    imgWrap.style.background = c.bg;
    const img = document.createElement('img');
    img.src = c.img;
    img.alt = c.name;
    img.loading = 'lazy';
    img.onerror = () => { imgWrap.innerHTML = `<div class="placeholder" style="background:${c.bg}">👤</div>`; };
    imgWrap.appendChild(img);

    const ov = document.createElement('div');
    ov.className = 'card-overlay';

    const foot = document.createElement('div');
    foot.className = 'card-footer';
    foot.style.background = c.bg;
    foot.innerHTML = `<div class="card-name">${c.name}</div><span class="card-role">${factionLabel(c.faction)}</span>`;

    card.appendChild(dot);
    card.appendChild(imgWrap);
    card.appendChild(ov);
    card.appendChild(foot);
    card.addEventListener('click', () => handleClick(c.id));
    grid.appendChild(card);
  });
}

function handleClick(id) {
  if (selectedId === id) {
    selectedId = null;
    document.getElementById('detail').classList.remove('visible');
  } else {
    selectedId = id;
    showDetail(id);
  }
  renderGrid();
  if (selectedId) setTimeout(() => document.getElementById('detail').scrollIntoView({ behavior:'smooth', block:'nearest' }), 80);
}

function showDetail(id) {
  const c = C.find(x => x.id === id);
  if (!c) return;

  document.getElementById('detailBar').style.background = c.bg;

  const di = document.getElementById('detailImg');
  di.style.background = c.bg;
  const img = document.createElement('img');
  img.src = c.img;
  img.alt = c.name;
  img.onerror = () => { di.innerHTML = `<div style="display:flex;align-items:center;justify-content:height:100%;font-size:2.5rem;padding:20px">👤</div>`; };
  di.innerHTML = '';
  di.appendChild(img);

  document.getElementById('detailName').textContent = c.name;
  document.getElementById('detailSub').textContent = c.jp + ' · ' + factionLabel(c.faction);
  document.getElementById('detailDesc').textContent = c.desc;
  document.getElementById('detailBadges').innerHTML = `
    <span class="badge gold">🏅 ${c.grade}</span>
    <span class="badge">🏫 ${c.affil}</span>
    <span class="badge red">⚡ ${c.technique}</span>
  `;
  document.getElementById('detail').classList.add('visible');
}

document.getElementById('closeBtn').addEventListener('click', () => {
  selectedId = null;
  document.getElementById('detail').classList.remove('visible');
  renderGrid();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.f;
    selectedId = null;
    document.getElementById('detail').classList.remove('visible');
    renderGrid();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  selectedId = null;
  document.getElementById('detail').classList.remove('visible');
  renderGrid();
});

renderGrid();
</script>
